# TemplrPress configuration
# Copy this file to config.yaml and customise.

site:
  name: "TemplrPress"
  title: "TemplrPress — Lightweight Markdown Site"
  description: "A single-binary, config-driven markdown publishing platform."
  url: "https://example.com"

server:
  host: "0.0.0.0"
  port: 3000

branding:
  logo_text: "TemplrPress"
  # logo_url: "/static/logo.svg"
  # logo_dark_url: "/static/logo-dark.svg"
  # favicon_url: "/static/favicon.svg"
  github_url: "https://github.com/senthilsweb/templrpress"
  primary_hex: "#1e40af"

  hero_badge: "Lightweight CMS"
  hero_heading: "Publish content"
  hero_heading_highlight: "fast"
  hero_heading_suffix: "with one binary"
  hero_tagline: "Markdown-driven landing page, docs, blog, and API reference. No build step. No database. Just config."
  hero_cta_primary_text: "Read the docs"
  hero_cta_primary_url: "/docs"
  hero_cta_secondary_text: "View Blog"
  hero_cta_secondary_url: "/blog"

# ---------------------------------------------------------------------------
# CMS — markdown content loader. Mirrors templrgo's `cms:` block.
#
# How sources are resolved (in order):
#   1. Embedded TemplrPress system docs are ALWAYS the primary source.
#   2. If `cms.source` points at a directory on disk, its contents are
#      UNION-merged with the embedded source. Embedded wins on path
#      collisions (folder/slug).
#   3. For any folder listed under `cms.folders`, the `source` path
#      switches that folder to REPLACE mode: the embedded counterpart
#      is hidden and only the override is served.
#
# Blog is always-external. If `cms.folders.blog.source` is unset, the
# loader looks for ./content/blog and then ./blog on disk and uses
# whichever exists. If neither exists, /blog returns empty (the embedded
# sample blog is never served).
# ---------------------------------------------------------------------------
cms:
  source: ""                  # Optional whole-tree union source (local dir).
  cache_ttl: "30m"            # Embedded content is cached; external is live.
  docs_root: "docs"           # Subfolder for docs. Set to "docs-empty" to
                              # ship a blank-canvas site with no bundled docs.
  about_file: "about.md"
  # folders:                  # Per-folder REPLACE overrides (optional).
  #   docs:
  #     source: "./content/docs"   # Hides embedded TemplrPress docs.
  #   blog:
  #     source: "./content/blog"   # Blog content is always external.

blog:
  enabled: false               # Hidden by default — flip to true to expose /blog.
  root: "blog"
  page_size: 10
  # source: ""                 # Explicit on-disk blog directory. When unset
                               # the loader auto-discovers ./content/blog or
                               # ./blog. Blog is never served from embed.

api_docs:
  enabled: true
  spec_url: "/static/openapi.yaml"  # Path to OpenAPI/Swagger spec (relative or http(s)).
  title: "TemplrPress API"

# OpenAPI / Swagger spec registry.
# Register additional specs shown in the /rest-api-spec viewer dropdown
# alongside the built-in TemplrPress spec.
#
# url must be a /static/... path. Two resolution strategies:
#   1. Embedded (default) — place files in static/openapi/ at build time;
#      they are compiled into the binary and served from memory.
#   2. Volume-mounted (Docker) — mount a host directory to
#      /app/static/openapi/ at runtime. The handler tries embed.FS first
#      then falls back to disk, so no config change is needed.
#
# Both JSON and YAML are accepted; YAML is re-emitted as JSON for the SPA.
# The synthetic `_builtin` entry is always shown first.
openapi_specs:
  - name: petstore
    url: /static/openapi/petstore.json
    description: "Demo · Swagger Petstore"
    is_default: false
  # Volume-mount example:
  # - name: my-api
  #   url: /static/openapi/my-api.json
  #   description: "My service API"
  #   is_default: true

footer:
  enabled: true
  tagline: "A single-binary markdown publishing platform."
  credit_prefix: "Built with"
  credit_text: "TemplrPress"
  credit_url: "https://github.com/senthilsweb/templrpress"
  cta_tagline: "Ready to publish?"
  cta_primary: "Ship your site."
  cta_secondary: "In one binary."
  cta_button_text: "Get started"
  cta_button_url: "/docs"
  columns:
    - title: "Product"
      links:
        - { label: "Docs",     url: "/docs" }
        - { label: "API",      url: "/api-docs" }
        - { label: "About",    url: "/about" }
    - title: "Resources"
      links:
        - { label: "Health",       url: "/healthz" }
        - { label: "Readiness",    url: "/readyz" }
        - { label: "Version",      url: "/api/version" }
    - title: "Project"
      links:
        - { label: "GitHub",  url: "https://github.com/senthilsweb/templrpress", external: true }
        - { label: "Issues",  url: "https://github.com/senthilsweb/templrpress/issues", external: true }
        - { label: "License", url: "https://github.com/senthilsweb/templrpress/blob/main/LICENSE", external: true }

# Top navigation. Children create a hover-flyout. Items with `enabled: false`
# are hidden. Set blog/api items to `enabled: false` to remove from nav even
# when the route itself stays enabled.
navigation:
  - label: "Docs"
    url: "/docs"
    icon: "book-open"
  - label: "Blog"
    url: "/blog"
    icon: "pen-line"
    enabled: false              # flip when blog.enabled = true
  - label: "API"
    url: "/rest-api-spec"
    icon: "code"
  - label: "About"
    url: "/about"
    icon: "info"
