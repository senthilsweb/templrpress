{{define "page_title"}}About — {{.Site.Title}}{{end}}
{{define "content"}}
<article class="mx-auto max-w-3xl px-6 py-16">
  {{if .Article}}
    <h1 class="mb-2 text-4xl font-bold tracking-tight">{{.Article.Title}}</h1>
    {{if .Article.Description}}<p class="mb-8 text-lg text-slate-600 dark:text-slate-400">{{.Article.Description}}</p>{{end}}
    <div class="prose prose-slate dark:prose-invert max-w-none">{{safeHTML .Article.HTML}}</div>
  {{else}}
    <h1 class="text-4xl font-bold">About</h1>
    <p class="mt-4 text-slate-600 dark:text-slate-400">No about page configured. Add <code>content/about.md</code>.</p>
  {{end}}
</article>
{{end}}
