{{- /* base layout — every page must define {{define "content"}} */ -}}
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{block "page_title" .}}{{.Site.Title}}{{end}}</title>
  <meta name="description" content="{{.Site.Description}}" />
  {{if .Branding.FaviconURL}}<link rel="icon" href="{{.Branding.FaviconURL}}" />{{end}}
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { primary: '{{.Branding.PrimaryHex}}' } } }
    };
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  </script>
  <style>
    :root { --tg-primary: {{.Branding.PrimaryHex}}; }
    .prose pre { background: #0b1220; color: #e5e7eb; border-radius: .5rem; padding: 1rem; overflow-x: auto; }
    .prose code { font-size: 0.9em; }
    .prose :where(code):not(:where([class~="not-prose"] *)) { background: rgba(0,0,0,0.05); padding: .15em .3em; border-radius: .25rem; }
    .dark .prose :where(code):not(:where([class~="not-prose"] *)) { background: rgba(255,255,255,0.08); }
  </style>
  {{block "extra_head" .}}{{end}}
</head>
<body class="min-h-screen bg-white text-slate-900 dark:bg-slate-950 dark:text-slate-100 antialiased flex flex-col">
  {{template "navbar.html" .}}
  <main class="flex-1 pt-14">
    {{template "content" .}}
  </main>
  {{if .Footer.Enabled}}{{template "footer.html" .}}{{end}}
  <script>
    function toggleTheme() {
      document.documentElement.classList.toggle('dark');
      localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
    }
  </script>
</body>
</html>
