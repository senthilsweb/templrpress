{{- /* navbar */ -}}
<header class="fixed top-0 inset-x-0 z-40 h-14 border-b border-slate-200/70 bg-white/80 backdrop-blur dark:bg-slate-950/80 dark:border-slate-800">
  <nav class="mx-auto flex h-full max-w-7xl items-center justify-between gap-4 px-4 sm:px-6">
    <a href="/" class="flex items-center gap-2 shrink-0">
      {{if .Branding.LogoURL}}
        <img src="{{.Branding.LogoURL}}" alt="{{.Branding.LogoText}}" class="h-8 w-auto dark:hidden" />
        <img src="{{or .Branding.LogoDarkURL .Branding.LogoURL}}" alt="{{.Branding.LogoText}}" class="h-8 w-auto hidden dark:block" />
      {{else}}
        <span class="text-xl font-semibold tracking-tight">{{.Branding.LogoText}}</span>
      {{end}}
    </a>

    <ul class="hidden md:flex items-center gap-1">
      {{range .Nav}}
        {{if .Children}}
          <li class="relative group">
            <button class="inline-flex items-center gap-1 rounded-md px-3 py-1.5 text-sm font-medium text-slate-700 hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-800">
              {{.Label}}
              <svg class="h-3 w-3 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
            </button>
            <div class="invisible opacity-0 group-hover:visible group-hover:opacity-100 transition absolute left-0 top-full mt-1 w-64 rounded-lg border border-slate-200 bg-white shadow-lg dark:bg-slate-900 dark:border-slate-800">
              <ul class="p-2">
                {{range .Children}}
                  <li>
                    <a href="{{.URL}}" {{if .External}}target="_blank" rel="noopener"{{end}} class="block rounded-md px-3 py-2 text-sm text-slate-700 hover:bg-slate-100 dark:text-slate-200 dark:hover:bg-slate-800">{{.Label}}</a>
                  </li>
                {{end}}
              </ul>
            </div>
          </li>
        {{else}}
          <li>
            <a href="{{.URL}}" {{if .External}}target="_blank" rel="noopener"{{end}} class="rounded-md px-3 py-1.5 text-sm font-medium text-slate-700 hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-800">{{.Label}}</a>
          </li>
        {{end}}
      {{end}}
    </ul>

    <div class="flex items-center gap-2">
      {{if .Branding.GitHubURL}}
      <a href="{{.Branding.GitHubURL}}" target="_blank" rel="noopener" class="rounded-md p-2 text-slate-500 hover:bg-slate-100 hover:text-slate-900 dark:hover:bg-slate-800 dark:hover:text-white" aria-label="GitHub" title="View on GitHub">
        <svg class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.65.5.5 5.66.5 12.04c0 5.1 3.29 9.42 7.86 10.95.57.1.78-.25.78-.55 0-.27-.01-1.18-.02-2.13-3.2.7-3.87-1.36-3.87-1.36-.52-1.32-1.27-1.67-1.27-1.67-1.04-.71.08-.7.08-.7 1.16.08 1.77 1.2 1.77 1.2 1.03 1.77 2.7 1.26 3.36.96.1-.75.4-1.27.73-1.56-2.55-.29-5.24-1.28-5.24-5.7 0-1.26.45-2.29 1.19-3.1-.12-.29-.52-1.46.11-3.04 0 0 .97-.31 3.18 1.18a11 11 0 015.79 0c2.21-1.49 3.18-1.18 3.18-1.18.63 1.58.23 2.75.11 3.04.74.81 1.19 1.84 1.19 3.1 0 4.43-2.7 5.41-5.27 5.69.41.36.78 1.06.78 2.14 0 1.55-.02 2.8-.02 3.18 0 .31.21.66.79.55A11.55 11.55 0 0023.5 12.04C23.5 5.66 18.35.5 12 .5z"/></svg>
      </a>
      {{end}}
      <a href="/settings" class="rounded-md p-2 text-slate-500 hover:bg-slate-100 hover:text-slate-900 dark:hover:bg-slate-800 dark:hover:text-white" aria-label="Settings" title="Settings">
        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      </a>
      <button onclick="toggleTheme()" class="rounded-md p-2 text-slate-500 hover:bg-slate-100 hover:text-slate-900 dark:hover:bg-slate-800 dark:hover:text-white" aria-label="Toggle theme" title="Toggle theme">
        <svg class="h-5 w-5 dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.36-6.36l-.7.7M6.34 17.66l-.7.7m12.72 0l-.7-.7M6.34 6.34l-.7-.7M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        <svg class="h-5 w-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>
      </button>
    </div>
  </nav>
</header>
